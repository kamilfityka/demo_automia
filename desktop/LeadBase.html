<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeadBase — AutomiaCRM</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />

  <style>
    /* entrance animations */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.7s linear infinite; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    .toast-in { animation: toastIn 0.28s cubic-bezier(.3,.8,.3,1); }
    @keyframes modalIn { from { opacity: 0; transform: translateY(14px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .modal-in { animation: modalIn 0.24s cubic-bezier(.3,.8,.3,1); }
    @keyframes menuIn { from { opacity: 0; transform: translateY(-6px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .menu-in { animation: menuIn 0.16s ease; transform-origin: top; }
    .lead-link { transition: color 0.15s ease; }
    .click:hover > .lead-link, .lead-link:hover { color: #C77DFF; }
    .nav-item:hover[data-active="false"] { background: rgba(255,255,255,0.06) !important; color: #fff !important; }
  </style>

  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="#1A1560"/>
      <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#E040A0"/><stop offset="0.5" stop-color="#9B40E0"/><stop offset="1" stop-color="#4060E0"/>
      </linearGradient></defs>
      <rect x="30" y="30" width="40" height="40" rx="13" fill="url(#g)"/>
      <path d="M50 40 L52.5 47.5 L60 50 L52.5 52.5 L50 60 L47.5 52.5 L40 50 L47.5 47.5 Z" fill="#fff"/>
    </svg>
  </template>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- data (plain JS) -->
  <script src="data/db.js"></script>

  <!-- components + screens (babel) -->
  <script type="text/babel" src="components/icons.jsx"></script>
  <script type="text/babel" src="components/ui.jsx"></script>
  <script type="text/babel" src="components/shell.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="screens/login.jsx"></script>
  <script type="text/babel" src="screens/dashboard.jsx"></script>
  <script type="text/babel" src="screens/leads-list.jsx"></script>
  <script type="text/babel" src="screens/leads-extra.jsx"></script>
  <script type="text/babel" src="screens/lead-detail.jsx"></script>
  <script type="text/babel" src="screens/forms-list.jsx"></script>
  <script type="text/babel" src="screens/form-builder.jsx"></script>
  <script type="text/babel" src="screens/public-form.jsx"></script>
  <script type="text/babel" src="screens/settings.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
